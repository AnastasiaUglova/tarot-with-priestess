<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d1b4e"/>
      <stop offset="100%" stop-color="#e8a85c"/>
    </linearGradient>
  </defs>
  <!-- sky gradient background -->
  <rect x="4" y="4" width="24" height="24" rx="3" fill="url(#sky)"/>
  <!-- water -->
  <rect x="4" y="18" width="24" height="10" rx="0" fill="#0f2b3d"/>
  <!-- round bottom corners -->
  <rect x="4" y="22" width="24" height="6" rx="3" fill="#0f2b3d"/>
  <!-- sun semicircle on horizon -->
  <path d="M11.5,18 A4.5,4.5 0 0,1 20.5,18 Z" fill="#f0c56d"/>
  <!-- sun reflection on water -->
  <rect x="12" y="18.5" width="8" height="1" rx="0.5" fill="#f0c56d" opacity="0.3"/>
  <rect x="13" y="20.2" width="6" height="0.7" rx="0.35" fill="#f0c56d" opacity="0.2"/>
  <rect x="13.8" y="21.7" width="4.4" height="0.5" rx="0.25" fill="#f0c56d" opacity="0.15"/>
  <rect x="14.5" y="23" width="3" height="0.4" rx="0.2" fill="#f0c56d" opacity="0.1"/>
</svg>
