<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d1b4e"/>
      <stop offset="100%" stop-color="#e8a85c"/>
    </linearGradient>
  </defs>
  <!-- sky gradient background - full bleed -->
  <rect width="32" height="32" fill="url(#sky)"/>
  <!-- water -->
  <rect x="0" y="19" width="32" height="13" fill="#0f2b3d"/>
  <!-- sun semicircle on horizon - big and bold -->
  <path d="M8,19 A8,8 0 0,1 24,19 Z" fill="#f0c56d"/>
  <!-- sun reflection on water -->
  <rect x="9" y="19.8" width="14" height="1.8" rx="0.9" fill="#f0c56d" opacity="0.35"/>
  <rect x="11" y="22.5" width="10" height="1.2" rx="0.6" fill="#f0c56d" opacity="0.25"/>
  <rect x="12.5" y="24.8" width="7" height="0.9" rx="0.45" fill="#f0c56d" opacity="0.15"/>
  <rect x="14" y="26.8" width="4" height="0.7" rx="0.35" fill="#f0c56d" opacity="0.1"/>
</svg>
